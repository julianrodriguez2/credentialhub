services:
  postgres:
    image: postgres:16-alpine
    container_name: credentialhub-postgres
    environment:
      POSTGRES_DB: credentialhub
      POSTGRES_USER: credentialhub
      POSTGRES_PASSWORD: credentialhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credentialhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    container_name: credentialhub-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://credentialhub:credentialhub@postgres:5432/credentialhub
      CORS_ORIGINS: http://localhost:3000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    container_name: credentialhub-frontend
    env_file:
      - ./frontend/.env
    environment:
      BACKEND_URL: http://backend:8000
      JWT_SECRET: change-this-in-production
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules: